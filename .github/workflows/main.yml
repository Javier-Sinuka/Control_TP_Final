name: Build & Deploy Quarkdown

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node (para Puppeteer)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Quarkdown
        uses: quarkdown-labs/setup-quarkdown@v1

      - name: Compile Quarkdown (FULL SITE)
        run: |
          mkdir -p output
          quarkdown c Informe_Final_Control.qd -o output/

      - name: Install Puppeteer
        run: |
          npm install puppeteer

      - name: Generate preview.png
        run: |
          cat << 'EOF' > generate-preview.js
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox'],
              executablePath: '/usr/bin/google-chrome-stable'
            });

            const page = await browser.newPage();

            await page.goto(`file://${process.cwd()}/output/index.html`, {
              waitUntil: 'networkidle0'
            });

            await page.setViewport({ width: 1280, height: 800 });

            await page.screenshot({
              path: 'preview.png',
              fullPage: true
            });

            await browser.close();
          })();
          EOF

          node generate-preview.js

      - name: Commit preview image
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add preview.png || true
          git commit -m "auto: update preview" || true
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
